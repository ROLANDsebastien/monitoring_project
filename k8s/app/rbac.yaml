---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: podinfo-sa
---
# Example Role: only needed if podinfo needs to interact with K8s API
# For now, we just ensure it has its own identity.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: podinfo-read-pods
subjects:
- kind: ServiceAccount
  name: podinfo-sa
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io
