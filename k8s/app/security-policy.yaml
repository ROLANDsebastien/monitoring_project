---
# 1. Deny all traffic by default
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
# 2. Allow DNS resolution (Egress to CoreDNS in kube-system)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
---
# 3. Allow Monitoring Ingress (Prometheus scraping)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-ingress
spec:
  podSelector:
    matchLabels:
      app: podinfo
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
    ports:
    - protocol: TCP
      port: 9898
---
# 4. Allow Application Traffic (Ingress for users)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-app-ingress
spec:
  podSelector:
    matchLabels:
      app: podinfo
  ingress:
  - from: [] # Allow from any for demo
    ports:
    - protocol: TCP
      port: 9898
---
# 5. Allow Egress to Monitoring (Tempo Traces & Loki)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-egress
spec:
  podSelector:
    matchLabels:
      app: podinfo
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
    ports:
    - protocol: TCP
      port: 3100 # Loki
    - protocol: TCP
      port: 3200 # Tempo API
    - protocol: TCP
      port: 14268 # Tempo Jaeger Thrift
    - protocol: TCP
      port: 4317 # Tempo OTLP gRPC
    - protocol: TCP
      port: 4318 # Tempo OTLP HTTP
