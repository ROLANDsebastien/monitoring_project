apiVersion: v1
kind: ConfigMap
metadata:
  name: monitoring-kube-prometheus-grafana-datasource
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  datasource.yaml: |-
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      uid: prometheus
      url: http://monitoring-kube-prometheus-prometheus:9090
      access: proxy
      isDefault: true
    - name: Loki
      type: loki
      uid: loki
      access: proxy
      url: http://loki:3100
      version: 1
      jsonData:
        derivedFields:
          - datasourceUid: tempo
            matcherRegex: "traceID=(\\w+)"
            name: TraceID
            url: "${__value.raw}"
    - name: Tempo
      uid: tempo
      type: tempo
      access: proxy
      url: http://tempo:3200
      version: 1
      jsonData:
        httpMethod: GET
        serviceMap:
          datasourceUid: prometheus
