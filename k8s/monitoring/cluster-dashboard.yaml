apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-overview-dashboard
  labels:
    grafana_dashboard: "1"
data:
  cluster-overview.json: |
    {
      "title": "Global Cluster Executive View",
      "uid": "cluster-exec-view",
      "panels": [
        {
          "title": "Cluster CPU Usage",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 0 },
          "targets": [{ "expr": "sum(node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate) / sum(kube_node_status_allocatable{resource='cpu'}) * 100" }]
        },
        {
          "title": "Cluster Memory Usage",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 0 },
          "targets": [{ "expr": "sum(container_memory_working_set_bytes{container!=''}) / sum(kube_node_status_allocatable{resource='memory'}) * 100" }]
        },
        {
          "title": "Healthy Pods vs Desired",
          "type": "stat",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 0 },
          "targets": [{ "expr": "sum(kube_pod_status_phase{phase='Running'})" }]
        }
      ],
      "schemaVersion": 38,
      "style": "dark",
      "time": { "from": "now-15m", "to": "now" }
    }
