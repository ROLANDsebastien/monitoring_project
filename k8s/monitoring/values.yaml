# Configuration - High Performance Management Hub
# Optimized for 18GB RAM (Apple Silicon)

prometheus:
  prometheusSpec:
    enableRemoteWriteReceiver: true
    retention: 1d
    resources:
      limits: { memory: 1536Mi }
      requests: { cpu: 200m, memory: 512Mi }
    # Discovery of ServiceMonitors across all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}
    # Discovery of PodMonitors across all namespaces
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorNamespaceSelector: {}
    # Rule selection across all namespaces
    ruleSelectorNilUsesHelmValues: false
    ruleNamespaceSelector: {}

# Activate Loki for log aggregation
loki:
  enabled: true
  persistence:
    enabled: false # RAM/Temp storage for demo (faster)
  resources:
    limits: { memory: 512Mi }
    requests: { cpu: 100m, memory: 128Mi }

promtail:
  enabled: true # Automatic log collector on all pods
  config:
    lokiAddress: http://loki:3100/loki/api/v1/push

grafana:
  adminPassword: prom-operator
  resources:
    limits: { memory: 512Mi }
    requests: { cpu: 100m, memory: 128Mi }
  
  # Automatic dashboard provisioning via ConfigMaps
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL

  # Automatic DataSources provisioning (Prometheus + Loki + Tempo)
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki:3100
      version: 1
      jsonData:
        derivedFields:
          - datasourceUid: tempo
            matcherRegex: "traceID=(\\w+)"
            name: TraceID
            url: "${__value.raw}"
    - name: Tempo
      uid: tempo
      type: tempo
      access: proxy
      url: http://tempo:3200
      version: 1

nodeExporter: { enabled: true }
kubeStateMetrics: { enabled: true }
