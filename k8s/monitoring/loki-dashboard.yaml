apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-logs-dashboard
  labels:
    grafana_dashboard: "1"
data:
  loki-logs.json: |
    {
      "title": "Loki / Centralized Logs",
      "uid": "loki-logs",
      "panels": [
        {
          "title": "Log Volume by Namespace",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum by (namespace) (count_over_time({namespace=~\".+\"} [1m]))",
              "legendFormat": "{{namespace}}"
            }
          ]
        },
        {
          "title": "Live Log Stream",
          "type": "logs",
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "{namespace=~\".+\"}",
              "refId": "A"
            }
          ]
        }
      ],
      "schemaVersion": 38,
      "style": "dark",
      "time": { "from": "now-1h", "to": "now" }
    }
